apiVersion: apps/v1
kind: Deployment
metadata:
  name: streamlit
  namespace: retailpulse
  labels:
    app: streamlit
spec:
  replicas: 1
  selector:
    matchLabels:
      app: streamlit
  template:
    metadata:
      labels:
        app: streamlit
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port:   "8000"
        prometheus.io/path:   "/metrics"
    spec:
      # Prefer different nodes when HPA scales to 2+ replicas.
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: streamlit
                topologyKey: kubernetes.io/hostname

      # Give in-flight Streamlit WebSocket sessions time to drain.
      terminationGracePeriodSeconds: 30

      initContainers:
        - name: wait-for-postgres
          image: postgres:15-alpine
          command:
            - sh
            - -c
            - |
              until pg_isready -h postgres -U postgres; do
                echo "waiting for postgres…"; sleep 3
              done
          env:
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: retailpulse-secret
                  key: POSTGRES_PASSWORD
          securityContext:
            runAsUser: 999
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]

      containers:
        - name: streamlit
          image: retailpulse-app:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8501
            - containerPort: 8000   # Prometheus metrics
          envFrom:
            - configMapRef:
                name: retailpulse-config
            - secretRef:
                name: retailpulse-secret
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "1500m"
              memory: "2Gi"

          securityContext:
            runAsUser: 1000
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            seccompProfile:
              type: RuntimeDefault
            capabilities:
              drop: [ALL]

          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: app-logs
              mountPath: /app/logs

          # startupProbe gives the ML model loader up to 200 s before liveness kicks in.
          # Without this, the liveness initialDelaySeconds would need to cover cold-start
          # time, which masks genuine deadlocks after startup.
          startupProbe:
            httpGet:
              path: /_stcore/health
              port: 8501
            failureThreshold: 20
            periodSeconds: 10

          livenessProbe:
            httpGet:
              path: /_stcore/health
              port: 8501
            periodSeconds: 20
            failureThreshold: 5

          readinessProbe:
            httpGet:
              path: /_stcore/health
              port: 8501
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3

          lifecycle:
            preStop:
              exec:
                # Let the load-balancer drain connections before the process exits.
                command: ["sh", "-c", "sleep 10"]

      volumes:
        - name: tmp
          emptyDir: {}
        - name: app-logs
          emptyDir: {}
