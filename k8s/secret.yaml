# IMPORTANT: Replace every placeholder below with real values before applying.
# Never commit real secrets to git.
# Production recommendation: use Sealed Secrets or External Secrets Operator
# to manage these values outside of version control.
#
# Apply:  kubectl apply -f k8s/secret.yaml -n retailpulse
apiVersion: v1
kind: Secret
metadata:
  name: retailpulse-secret
  namespace: retailpulse
type: Opaque
stringData:
  # PostgreSQL
  POSTGRES_PASSWORD: "change-me"
  DATABASE_URL:      "postgresql://postgres:change-me@postgres:5432/retailpulse"

  # Redis
  REDIS_URL: "redis://redis:6379/0"

  # MLflow
  MLFLOW_TRACKING_URI: "http://mlflow:5000"

  # Application JWT secret (min 32 characters)
  RETAILPULSE_SECRET: "change-me-use-32-random-chars-min"

  # Groq AI
  GROQ_API_KEY: "gsk_your_groq_api_key_here"

  # Email alerts
  ALERT_EMAIL_SENDER:   "your-sender@gmail.com"
  ALERT_EMAIL_PASSWORD: "your-gmail-app-password"
  ALERT_EMAIL_RECEIVER: "your-receiver@gmail.com"
